services:
  pipeline-service:
    build: .
    image: dotnet-8-python-310
    volumes:
      - .:/app
  initialize-jupyter-lab:
    build: .
    image: dotnet-8-python-310
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    tty: true
    command: jupyter lab --ip=0.0.0.0 --no-browser --LabApp.token=''
  initialize-fastapi:
    build: .
    image: dotnet-8-python-310
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    tty: true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload